<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My first three.js app</title>
    <style>body { margin: 0; overflow: hidden; }</style>
    <script src="//api.bitrix24.com/api/v1/"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-js@79.0.0/three.min.js"></script>
</head>
<body>

<script>
window.onload = function() {

        if (typeof BX24 !== 'undefined' && BX24) {
            console.log('BX24 найдена, инициализируем...');
            BX24.init(function() {
                console.log('✅ BX24 инициализирована!');
                BX24.installFinish();

                BX24.callMethod('user.current', {}, function(result) {
                    if (result.error()) {
                        console.error('Ошибка API:', result.error());
                    } else {
                        console.log('Пользователь:', result.data());
                    }
                });

            });
        } else {
            console.error('❌ Библиотека BX24 не загружена. Приложение должно работать внутри iframe на портале Битрикс24.');
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshBasicMaterial({ color: 0x9725B3 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        let time = 0; 



        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
   
            const r = Math.sin(time) * 0.5 + 0.5;
            const g = 0.5;
            const b = Math.cos(time) * 0.5 + 0.5;
            cube.material.color.setRGB(r, g, b);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    };
</script>

</body>
</html>
